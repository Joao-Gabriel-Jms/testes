<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de gatinhos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- gatos pretos -->
    <div class="mnpreto">
        <h1>Gatos Pretos</h1>
    <button onclick="fpreto()" class="fbtn">X</button>

        
        <div class="colunapreto">
          <img src="imgp/gatolingua.jpg" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gatim.webp" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gatocesta.jpg" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gato-preto04.jpg" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gatoooo.jpg" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gatoenrolado.jpg" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gatpre.avif" alt="Gato preto" width="300px" height="200px">
          <img src="imgp/gato-preto-fofo111.jpg" alt="Gato preto" width="300px" height="200px">
    </div>
    </div>

    <div class="mnbranco">
        <h1>Gatos Brancos</h1>
    <button onclick="fbranco()" class="fbtn">X</button>

        <div class="colunabranco">
          <img src="imgb/gatobranco.png" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco2.webp" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco3.jpg" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco4.jpg" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco5.jpg" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco6.webp" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco7.jpg" alt="Gato branco" width="300px" height="200px">
          <img src="imgb/gatobranco8.avif" alt="Gato branco" width="300px" height="200px">
    </div>
    </div>



    <!-- Título -->
    <div class="titulo">
        <h1>Bem-Vindo Melhor site do Mundo</h1>
        <p>Aqui você verá gatos fofos</p>

    </div>

    <!-- Imagens -->

    <img src="img/gatofofo.jpg" alt="Gato fofo" width="300px" height="200px">
    <img src="img/gatofofo2.jpg" alt="Gato fofo número 2" width="300px" height="200px">


    <!-- Filtros -->
    <div class="filtros">
        <h2>Quais cores você prefere?</h2>
        <div class="bfiltros">
        <button onclick="filterColors()" class="btn">Cores</button>
        </div>
    </div>

    <!-- Menu de cores -->
    <div class="menu">
        <h1>Escolha a cor que você prefere</h1>

        <div class="opcoes">
            <button onclick="mpreto()" class="btn">Preto</button>
            <button onclick="mbranco()" class="btn">Branco</button>
            <button onclick="filterColors('cinza')" class="btn">Cinza</button>
            <button onclick="filterColors('laranja')" class="btn">Laranja</button>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
