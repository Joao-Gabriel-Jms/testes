<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de gatinhos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Área que aparece quando clicar em gatos pretos -->
    <div class="mnpreto">
        <h1>Gatos Pretos</h1>
        <div class="colunapreto">
          <img src="img/gato_preto_ampara_petlove_.png" alt="Gato preto" width="300px" height="200px">
          <img src="img/GATO1.jpg" alt="Gato preto" width="300px" height="200px">
    </div>
    </div>
    

    <!-- Título -->
    <div class="titulo">
        <h1>Bem-Vindo Melhor site do Mundo</h1>
        <p>Aqui você verá gatos fofos</p>
    </div>

    <!-- Imagens -->
    <img src="img/gatofofo.jpg" alt="Gato fofo" width="300px" height="200px">
    <img src="img/gatofofo2.jpg" alt="Gato fofo número 2" width="300px" height="200px">

    <!-- Filtros -->
    <div class="filtros">
        <h2>Quais cores você prefere?</h2>
        <button onclick="filterColors()" class="btn">Cores</button>
    </div>

    <!-- Menu de cores -->
    <div class="menu">
        <h1>Escolha a cor que você prefere</h1>

        <div class="opcoes">
            <button onclick="mpreto()" class="btn">Preto</button>
            <button onclick="filterColors('branco')" class="btn">Branco</button>
            <button onclick="filterColors('cinza')" class="btn">Cinza</button>
            <button onclick="filterColors('laranja')" class="btn">Laranja</button>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
